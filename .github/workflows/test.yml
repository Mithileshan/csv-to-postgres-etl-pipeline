name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: etl_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r elt/requirements.txt
    
    - name: Run pytest with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/etl_db
        DATABASE_HOST: localhost
        DATABASE_PORT: 5432
        DATABASE_NAME: etl_db
        DATABASE_USER: postgres
        DATABASE_PASSWORD: postgres
      run: |
        cd elt
        pytest tests/test_phase3.py -v --cov=. --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./elt/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
